<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Busbar 3D Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; }
#canvas-container { width: 100%; height: 100%; background: #0F1117; }
.top-bar { position: fixed; top: 0; left: 0; right: 0; display: flex; align-items: center; padding: 0 1.25rem; height: 48px; background: #1E293B; border-bottom: 2px solid #2D7A4F; color: #fff; z-index: 10; gap: 0.75rem; }
.topbar-logo { height: 26px; width: auto; flex-shrink: 0; }
.topbar-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.15); flex-shrink: 0; }
.filename-label { font-weight: 400; font-size: 12px; font-family: 'Inter', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: rgba(255,255,255,0.65); flex: 1; min-width: 0; }
.top-actions { display: flex; align-items: center; gap: 0.65rem; flex-shrink: 0; }
.top-bar a.back-link { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 11px; font-weight: 500; white-space: nowrap; }
.top-bar a.back-link:hover { color: rgba(255,255,255,0.85); }
.btn-download { background: #2D7A4F; color: #fff; border: none; padding: 0.35rem 0.8rem; border-radius: 5px; font-family: inherit; font-size: 11px; font-weight: 600; text-decoration: none; display: inline-block; white-space: nowrap; }
.btn-download:hover { background: #235f3d; }
.bottom-hint { position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.3); padding: 0.4rem 0.875rem; border-radius: 4px; font-size: 10px; z-index: 10; pointer-events: none; letter-spacing: 0.05em; }
.load-error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff6b6b; background: rgba(0,0,0,0.88); padding: 1.5rem 2rem; border-radius: 8px; border: 1px solid #DC2626; display: none; z-index: 20; text-align: center; max-width: 90%; }
.load-error.active { display: block; }
  </style>
</head>
<body>
  <div class="top-bar">
    <img src="/static/assets/taqana_logo.png" alt="TAQANA" class="topbar-logo"
         onerror="this.style.display='none'">
    <div class="topbar-divider"></div>
    <span class="filename-label" id="filename-label">Loading…</span>
    <div class="top-actions">
      <a href="/" class="back-link">← Back to form</a>
      <a class="btn-download" id="download-step" href="#">Download STEP</a>
    </div>
  </div>
  <div id="canvas-container"></div>
  <div class="bottom-hint">Drag to orbit · Scroll to zoom · Right-click to pan</div>
  <div class="load-error" id="load-error"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    const stlFile = new URLSearchParams(window.location.search).get('file') || 'busbar.stl';
    const stepFile = stlFile.replace('.stl', '.step');

    document.getElementById('filename-label').textContent = stlFile;
    const downloadBtn = document.getElementById('download-step');
    downloadBtn.href = `/output/${encodeURIComponent(stepFile)}`;
    downloadBtn.download = stepFile;

    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
    camera.position.set(200, 150, 200);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight1.position.set(100, 200, 100);
    scene.add(dirLight1);
    const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
    dirLight2.position.set(-100, -50, -100);
    scene.add(dirLight2);

    const loader = new THREE.STLLoader();
    loader.load(
      `/output/${encodeURIComponent(stlFile)}`,
      function (geometry) {
        geometry.computeVertexNormals();
        const material = new THREE.MeshStandardMaterial({
          color: 0xe67e22,
          metalness: 0.5,
          roughness: 0.4,
        });
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        geometry.computeBoundingBox();
        const box = geometry.boundingBox;
        const center = new THREE.Vector3();
        box.getCenter(center);
        mesh.position.sub(center);

        const sphere = box.getBoundingSphere(new THREE.Sphere());
        const dist = sphere.radius * 2.5;
        camera.position.set(dist, dist * 0.75, dist);
        camera.lookAt(0, 0, 0);
        controls.target.set(0, 0, 0);
        controls.update();
      },
      undefined,
      function () {
        document.getElementById('load-error').textContent = `Failed to load model: ${stlFile}`;
        document.getElementById('load-error').classList.add('active');
      }
    );

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
